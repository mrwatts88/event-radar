name: Daily Event Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EVENT_RADAR_SMTP_PASSWORD: ${{ secrets.EVENT_RADAR_SMTP_PASSWORD }}
      TZ: America/Chicago
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate config
        run: event-radar validate-config --config event_radar.yaml

      - name: Run daily radar
        run: event-radar run --config event_radar.yaml
